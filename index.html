<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Staff Operations Dashboard | Real-time Monitoring System</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #0a0a0a; overflow-x: hidden; }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: linear-gradient(135deg, #a855f7, #7c3aed); border-radius: 10px; }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
        .animate-pulse { animation: pulse 2s cubic-bezier(0.4,0,0.6,1) infinite; }
        .glass { background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); }
    </style>
</head>
<body>
<div id="app"></div>

<script>
    // ============ DATA DUMMY UNTUK TESTING ============
    const DEMO_USERS = {
        'haris789smb@gmail.com': {
            password: 'demo123',  // Password untuk demo
            name: 'Haris - Leader',
            role: 'LEADER',
            photoURL: ''
        },
        'kasir1@gmail.com': {
            password: 'demo123',
            name: 'Budi - Kasir',
            role: 'KASIR',
            photoURL: ''
        },
        'kasir2@gmail.com': {
            password: 'demo123',
            name: 'Ani - Kasir',
            role: 'KASIR',
            photoURL: ''
        },
        'csline1@gmail.com': {
            password: 'demo123',
            name: 'Citra - CS Line',

            photoURL: ''
        },
        'cschat1@gmail.com': {
            password: 'demo123',
            name: 'Dewi - CS Livechat',
            role: 'CS_LIVECHAT',
            photoURL: ''
        },
        'kks1@gmail.com': {
            password: 'demo123',
            name: 'Eko - KKS',
            role: 'KKS',
            photoURL: ''
        }
    };
    
    // Staff list untuk dashboard
    let staffList = [
        { id: '1', name: 'Haris', email: 'haris789smb@gmail.com', role: 'LEADER', status: 'aktif', online: true, absenMasuk: null, izinStatus: null },
        { id: '2', name: 'Budi', email: 'kasir1@gmail.com', role: 'KASIR', status: 'aktif', online: true, absenMasuk: null, izinStatus: null },
        { id: '3', name: 'Ani', email: 'kasir2@gmail.com', role: 'KASIR', status: 'aktif', online: true, absenMasuk: null, izinStatus: null },
        { id: '4', name: 'Citra', email: 'csline1@gmail.com', role: 'CS_LINE', status: 'aktif', online: false, absenMasuk: null, izinStatus: null },
        { id: '5', name: 'Dewi', email: 'cschat1@gmail.com', role: 'CS_LIVECHAT', status: 'aktif', online: true, absenMasuk: null, izinStatus: null },
        { id: '6', name: 'Eko', email: 'kks1@gmail.com', role: 'KKS', status: 'aktif', online: false, absenMasuk: null, izinStatus: null }
    ];
    
    let currentUser = null;
    let currentUserRole = null;
    let currentUserData = null;
    let activeIzin = null;
    let countdownInterval = null;
    let todayIzinCount = 0;
    let currentPage = 'dashboard';
    
    // Helper functions
    function showNotification(message, type = 'info') {
        const container = document.getElementById('notification-container');
        if (!container) return;
        
        const colors = {
            success: 'from-green-500 to-emerald-500',
            error: 'from-red-500 to-pink-500',
            warning: 'from-yellow-500 to-orange-500',
            info: 'from-blue-500 to-cyan-500'
        };
        
        const icons = { success: '✓', error: '✗', warning: '!', info: 'ℹ' };
        
        const notification = document.createElement('div');
        notification.className = 'transform transition-all duration-300 translate-x-full mb-2';
        notification.innerHTML = `
            <div class="bg-gradient-to-r ${colors[type]} rounded-lg shadow-lg p-4 min-w-[280px] backdrop-blur-sm">
                <div class="flex items-center gap-3">
                    <div class="w-6 h-6 rounded-full bg-white/20 flex items-center justify-center">
                        <span class="text-white text-sm font-bold">${icons[type]}</span>
                    </div>
                    <p class="text-white text-sm">${message}</p>
                </div>
            </div>
        `;
        
        container.appendChild(notification);
        setTimeout(() => notification.classList.remove('translate-x-full'), 100);
        setTimeout(() => {
            notification.classList.add('translate-x-full');
            setTimeout(() => notification.remove(), 300);
        }, 3000);
    }
    
    function formatDateTime() {
        return new Date().toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    }
    
    function getCurrentShift() {
        const hour = new Date().getHours();
        if (hour >= 6 && hour < 14) return '🌅 Pagi (06:00-14:00)';
        if (hour >= 14 && hour < 22) return '🌇 Sore (14:00-22:00)';
        return '🌙 Malam (22:00-06:00)';
    }
    
    // Login function
    function handleLogin(email, password) {
        const user = DEMO_USERS[email];
        
        if (!user) {
            showNotification('Email tidak ditemukan! Gunakan email yang terdaftar.', 'error');
            return false;
        }
        
        if (user.password !== password) {
            showNotification('Password salah! Gunakan: demo123', 'error');
            return false;
        }
        
        currentUser = { email: email, ...user };
        currentUserRole = user.role;
        currentUserData = staffList.find(s => s.email === email);
        
        if (!currentUserData) {
            // Add to staff list if not exists
            const newId = (staffList.length + 1).toString();
            currentUserData = { id: newId, name: user.name, email: email, role: user.role, status: 'aktif', online: true, absenMasuk: null, izinStatus: null };
            staffList.push(currentUserData);
        } else {
            currentUserData.online = true;
        }
        
        showNotification(`Selamat datang ${user.name} (${user.role})`, 'success');
        renderDashboard();
        return true;
    }
    
    function logout() {
        if (currentUserData) {
            currentUserData.online = false;
        }
        currentUser = null;
        currentUserRole = null;
        currentUserData = null;
        if (countdownInterval) clearInterval(countdownInterval);
        renderLogin();
        showNotification('Logout berhasil', 'info');
    }
    
    // Business Logic
    function createIzin(type, duration) {
        if (currentUserRole === 'LEADER') {
            showNotification('Leader tidak dapat membuat izin keluar', 'warning');
            return;
        }
        
        if (!currentUserData?.absenMasuk) {
            showNotification('❌ Anda belum absen masuk! Silakan absen terlebih dahulu.', 'error');
            return;
        }
        
        if (todayIzinCount >= 4) {
            showNotification('❌ Batas izin harian telah tercapai (4/4)!', 'error');
            return;
        }
        
        const endTime = new Date();
        endTime.setMinutes(endTime.getMinutes() + duration);
        
        activeIzin = {
            type: type,
            duration: duration,
            endTime: endTime
        };
        
        currentUserData.izinStatus = 'keluar';
        currentUserData.status = 'izin';
        todayIzinCount++;
        
        showNotification(`✅ Izin ${type === 'merokok' ? 'Merokok' : 'Tidak Merokok'} berhasil! Durasi: ${duration} menit`, 'success');
        
        if (countdownInterval) clearInterval(countdownInterval);
        countdownInterval = setInterval(() => {
            if (activeIzin && new Date() >= activeIzin.endTime) {
                clearInterval(countdownInterval);
                activeIzin = null;
                if (currentUserData) {
                    currentUserData.izinStatus = null;
                    currentUserData.status = 'aktif';
                }
                showNotification('Waktu izin telah selesai, silakan kembali bertugas', 'info');
                refreshCurrentPage();
            }
            refreshCurrentPage();
        }, 1000);
        
        refreshCurrentPage();
    }
    
    function absenMasuk() {
        if (currentUserData) {
            currentUserData.absenMasuk = new Date();
            currentUserData.status = 'aktif';
            showNotification('✅ Absen masuk berhasil!', 'success');
            refreshCurrentPage();
        }
    }
    
    function absenPulang() {
        if (currentUserData) {
            currentUserData.absenPulang = new Date();
            currentUserData.online = false;
            showNotification('✅ Absen pulang berhasil! Terima kasih.', 'success');
            refreshCurrentPage();
        }
    }
    
    // Staff Management (Leader only)
    function registerStaff(email, name, role) {
        if (currentUserRole !== 'LEADER') {
            showNotification('Akses ditolak! Hanya Leader yang dapat mendaftarkan staff.', 'error');
            return;
        }
        
        if (!email || !name || !role) {
            showNotification('Semua field harus diisi!', 'error');
            return;
        }
        
        if (staffList.find(s => s.email === email)) {
            showNotification('Email sudah terdaftar!', 'error');
            return;
        }
        
        const newId = (staffList.length + 1).toString();
        staffList.push({
            id: newId,
            name: name,
            email: email,
            role: role,
            status: 'aktif',
            online: false,
            absenMasuk: null,
            izinStatus: null
        });
        
        // Also add to DEMO_USERS for login
        DEMO_USERS[email] = {
            password: 'demo123',
            name: name,
            role: role,
            photoURL: ''
        };
        
        showNotification(`✅ Staff ${name} (${email}) berhasil didaftarkan!`, 'success');
        renderStaffManagement();
        refreshCurrentPage();
    }
    
    function updateStaffRole(staffId, newRole) {
        if (currentUserRole !== 'LEADER') return;
        const staff = staffList.find(s => s.id === staffId);
        if (staff) {
            staff.role = newRole;
            if (DEMO_USERS[staff.email]) {
                DEMO_USERS[staff.email].role = newRole;
            }
            showNotification('✅ Role staff berhasil diupdate!', 'success');
            renderStaffManagement();
            refreshCurrentPage();
        }
    }
    
    function deleteStaff(staffId) {
        if (currentUserRole !== 'LEADER') return;
        if (confirm('Yakin ingin menghapus staff ini?')) {
            const index = staffList.findIndex(s => s.id === staffId);
            if (index !== -1) {
                delete DEMO_USERS[staffList[index].email];
                staffList.splice(index, 1);
                showNotification('✅ Staff berhasil dihapus!', 'success');
                renderStaffManagement();
                refreshCurrentPage();
            }
        }
    }
    
    // Render Functions
    function refreshCurrentPage() {
        if (currentPage === 'dashboard') renderDashboardContent();
        else if (currentPage === 'izin') renderIzinContent();
        else if (currentPage === 'absensi') renderAbsensiContent();
        else if (currentPage === 'staff') renderStaffManagement();
    }
    
    function setActivePage(page) {
        currentPage = page;
        refreshCurrentPage();
        
        document.querySelectorAll('.nav-item').forEach(item => {
            if (item.dataset.page === page) {
                item.classList.add('bg-gradient-to-r', 'from-purple-600/20', 'to-pink-600/20', 'border-l-4', 'border-purple-500');
                item.querySelector('span').classList.add('text-white');
                item.querySelector('span').classList.remove('text-gray-300');
            } else {
                item.classList.remove('bg-gradient-to-r', 'from-purple-600/20', 'to-pink-600/20', 'border-l-4', 'border-purple-500');
                item.querySelector('span').classList.remove('text-white');
                item.querySelector('span').classList.add('text-gray-300');
            }
        });
    }
    
    function renderLogin() {
        const app = document.getElementById('app');
        app.innerHTML = `
            <div class="min-h-screen bg-gradient-to-br from-gray-900 via-purple-900/20 to-gray-900 flex items-center justify-center p-4">
                <div class="fixed inset-0 opacity-10 pointer-events-none" style="background-image: url('https://cdn.areabermain.club/assets/cdn/az5/2026/03/02/20260302/997f37bf3bc90016a5e32ae52406c5c4/background-web-hokbentoto-1.jpg'); background-size: cover; background-position: center;"></div>
                
                <div class="relative z-10 w-full max-w-md">
                    <div class="text-center mb-8">
                        <div class="w-20 h-20 rounded-2xl bg-gradient-to-br from-purple-500 to-pink-500 flex items-center justify-center mx-auto shadow-lg shadow-purple-500/50 animate-pulse">
                            <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path>
                            </svg>
                        </div>
                        <h1 class="text-2xl font-bold text-white mt-4">Staff Operations</h1>
                        <p class="text-purple-300 text-sm">Real-time Monitoring System</p>
                    </div>
                    
                    <div class="bg-gray-900/50 backdrop-blur-xl rounded-2xl border border-purple-500/20 p-8">
                        <div class="text-center mb-6">
                            <p class="text-gray-300">Login dengan email dan password</p>
                            <p class="text-gray-500 text-sm mt-2">Gunakan akun demo di bawah</p>
                        </div>
                        
                        <form id="login-form" class="space-y-4">
                            <input type="email" id="email" placeholder="Email" class="w-full px-4 py-3 bg-gray-800/50 border border-purple-500/20 rounded-lg text-white focus:outline-none focus:border-purple-500">
                            <input type="password" id="password" placeholder="Password" class="w-full px-4 py-3 bg-gray-800/50 border border-purple-500/20 rounded-lg text-white focus:outline-none focus:border-purple-500">
                            <button type="submit" class="w-full py-3 bg-gradient-to-r from-purple-600 to-pink-600 rounded-lg text-white font-bold hover:shadow-lg hover:scale-105 transition-all">
                                Login
                            </button>
                        </form>
                    </div>
                    
                    <div class="mt-4 p-4 bg-green-500/10 rounded-lg border border-green-500/20">
                        <p class="text-green-400 text-sm text-center font-bold">✅ AKUN DEMO:</p>
                        <div class="text-xs text-gray-300 mt-2 space-y-1">
                            <p>🔵 Leader: haris789smb@gmail.com / demo123</p>
                            <p>🟢 Kasir: kasir1@gmail.com / demo123</p>
                            <p>🟡 CS Line: csline1@gmail.com / demo123</p>
                            <p>🟠 CS Livechat: cschat1@gmail.com / demo123</p>
                            <p>🔴 KKS: kks1@gmail.com / demo123</p>
                        </div>
                    </div>
                </div>
            </div>
            <div id="notification-container" class="fixed top-4 right-4 z-50"></div>
        `;
        
        document.getElementById('login-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            handleLogin(email, password);
        });
    }
    
    function renderDashboard() {
        const onlineCount = staffList.filter(s => s.online).length;
        const izinCount = staffList.filter(s => s.izinStatus === 'keluar').length;
        const totalStaff = staffList.length;
        const currentShift = getCurrentShift();
        
        const app = document.getElementById('app');
        app.innerHTML = `
            <div class="min-h-screen bg-gradient-to-br from-gray-900 via-purple-900/10 to-gray-900">
                <div class="fixed inset-0 opacity-10 pointer-events-none" style="background-image: url('https://cdn.areabermain.club/assets/cdn/az5/2026/03/02/20260302/997f37bf3bc90016a5e32ae52406c5c4/background-web-hokbentoto-1.jpg'); background-size: cover; background-position: center; background-attachment: fixed;"></div>
                
                <!-- Sidebar -->
                <div id="sidebar" class="fixed left-0 top-0 h-full w-64 bg-gradient-to-b from-gray-900 via-purple-900/20 to-gray-900 backdrop-blur-xl border-r border-purple-500/20 transform -translate-x-full lg:translate-x-0 transition-transform duration-300 z-30 overflow-y-auto">
                    <div class="p-6 border-b border-purple-500/20">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-purple-500 to-pink-500 flex items-center justify-center shadow-lg">
                                <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path>
                                </svg>
                            </div>
                            <div>
                                <h1 class="text-white font-bold text-lg">Staff Ops</h1>
                                <p class="text-purple-300 text-xs">Demo Mode</p>
                            </div>
                        </div>
                    </div>
                    
                    <div class="p-4 m-4 rounded-xl bg-gradient-to-r from-purple-500/10 to-pink-500/10 border border-purple-500/20">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 rounded-full bg-gradient-to-br from-purple-500 to-pink-500 flex items-center justify-center">
                                <span class="text-white font-bold">${currentUser?.name?.charAt(0) || 'U'}</span>
                            </div>
                            <div class="flex-1 min-w-0">
                                <p class="text-white font-medium text-sm truncate">${currentUser?.name || 'User'}</p>
                                <p class="text-xs bg-gradient-to-r from-purple-400 to-pink-400 bg-clip-text text-transparent">${currentUserRole?.replace('_', ' ')}</p>
                            </div>
                        </div>
                    </div>
                    
                    <nav class="flex-1 py-4" id="nav-menu"></nav>
                    
                    <div class="p-4 border-t border-purple-500/20">
                        <button id="logout-btn" class="w-full flex items-center gap-3 px-3 py-2 rounded-lg text-red-400 hover:bg-red-500/10 transition-all">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path>
                            </svg>
                            <span class="text-sm">Logout</span>
                        </button>
                    </div>
                </div>
                
                <button id="mobile-menu-btn" class="lg:hidden fixed top-4 left-4 z-20 p-2 bg-purple-600 rounded-lg text-white">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                    </svg>
                </button>
                
                <div class="lg:ml-64">
                    <div id="main-content" class="p-4 lg:p-8"></div>
                </div>
            </div>
            <div id="notification-container" class="fixed top-4 right-4 z-50 space-y-2"></div>
        `;
        
        const navMenu = document.getElementById('nav-menu');
        const menuItems = [
            { page: 'dashboard', label: 'Dashboard', icon: 'M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6' },
            { page: 'izin', label: 'Izin Keluar', icon: 'M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z' },
            { page: 'absensi', label: 'Absensi', icon: 'M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z' }
        ];
        
        if (currentUserRole === 'LEADER') {
            menuItems.push({ page: 'staff', label: 'Management Staff', icon: 'M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z' });
        }
        
        menuItems.forEach(item => {
            const link = document.createElement('a');
            link.href = '#';
            link.className = `nav-item flex items-center gap-3 px-6 py-3 mx-2 rounded-lg transition-all hover:bg-white/5 ${currentPage === item.page ? 'bg-gradient-to-r from-purple-600/20 to-pink-600/20 border-l-4 border-purple-500' : ''}`;
            link.dataset.page = item.page;
            link.innerHTML = `
                <svg class="w-5 h-5 ${currentPage === item.page ? 'text-purple-400' : 'text-gray-400'}" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="${item.icon}"></path>
                </svg>
                <span class="text-sm ${currentPage === item.page ? 'text-white' : 'text-gray-300'}">${item.label}</span>
            `;
            link.addEventListener('click', (e) => {
                e.preventDefault();
                setActivePage(item.page);
            });
            navMenu.appendChild(link);
        });
        
        document.getElementById('logout-btn').addEventListener('click', logout);
        document.getElementById('mobile-menu-btn').addEventListener('click', () => {
            document.getElementById('sidebar').classList.toggle('translate-x-0');
        });
        
        refreshCurrentPage();
    }
    
    function renderDashboardContent() {
        const onlineCount = staffList.filter(s => s.online).length;
        const izinCount = staffList.filter(s => s.izinStatus === 'keluar').length;
        const totalStaff = staffList.length;
        
        const container = document.getElementById('main-content');
        container.innerHTML = `
            <div class="space-y-6">
                <div>
                    <h1 class="text-3xl lg:text-4xl font-bold bg-gradient-to-r from-purple-400 via-pink-400 to-purple-400 bg-clip-text text-transparent">
                        Operational Dashboard
                    </h1>
                    <p class="text-gray-400 mt-2">Real-time monitoring & staff management system (DEMO MODE)</p>
                    <p class="text-purple-300 text-sm mt-1">${formatDateTime()} | Shift: ${getCurrentShift()}</p>
                </div>
                
                <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
                    ${createStatCard('Staff Online', onlineCount, 'from-green-500 to-emerald-500')}
                    ${createStatCard('Sedang Izin', izinCount, 'from-yellow-500 to-orange-500')}
                    ${createStatCard('Total Staff', totalStaff, 'from-blue-500 to-cyan-500')}
                    ${createStatCard('Izin Hari Ini', todayIzinCount + '/4', 'from-purple-500 to-indigo-500')}
                </div>
                
                <div class="bg-gray-900/50 backdrop-blur-xl rounded-2xl border border-purple-500/20 p-6">
                    <h2 class="text-xl font-semibold text-white mb-4 flex items-center gap-2">
                        <div class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div>
                        Daftar Staff Real-time
                    </h2>
                    <div class="overflow-x-auto">
                        <table class="w-full">
                            <thead>
                                <tr class="border-b border-purple-500/20">
                                    <th class="text-left py-3 px-4 text-gray-400">Nama</th>
                                    <th class="text-left py-3 px-4 text-gray-400">Role</th>
                                    <th class="text-left py-3 px-4 text-gray-400">Status</th>
                                    <th class="text-left py-3 px-4 text-gray-400">Izin</th>
                                    <th class="text-left py-3 px-4 text-gray-400">Online</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${staffList.map(staff => `
                                    <tr class="border-b border-purple-500/10 hover:bg-white/5">
                                        <td class="py-3 px-4 text-white">${staff.name}</td>
                                        <td class="py-3 px-4"><span class="px-2 py-1 rounded-lg text-xs bg-purple-500/20 text-purple-300">${staff.role?.replace('_', ' ')}</span></td>
                                        <td class="py-3 px-4"><span class="px-2 py-1 rounded-lg text-xs ${staff.status === 'aktif' ? 'bg-green-500/20 text-green-400' : staff.status === 'izin' ? 'bg-yellow-500/20 text-yellow-400' : 'bg-gray-500/20 text-gray-400'}">${staff.status === 'aktif' ? 'Aktif' : staff.status === 'izin' ? 'Izin' : 'Offline'}</span></td>
                                        <td class="py-3 px-4">${staff.izinStatus === 'keluar' ? '<span class="text-yellow-400 text-sm">Sedang Izin</span>' : '-'}</td>
                                        <td class="py-3 px-4"><div class="flex items-center gap-2"><div class="w-2 h-2 rounded-full ${staff.online ? 'bg-green-500 animate-pulse' : 'bg-gray-500'}"></div><span class="text-xs ${staff.online ? 'text-green-400' : 'text-gray-500'}">${staff.online ? 'Online' : 'Offline'}</span></div></td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        `;
    }
    
    function createStatCard(title, value, gradient) {
        return `
            <div class="relative group">
                <div class="absolute inset-0 bg-gradient-to-r ${gradient} rounded-2xl blur-xl opacity-20 group-hover:opacity-40 transition-opacity"></div>
                <div class="relative bg-gray-900/80 backdrop-blur-xl rounded-2xl border border-white/10 p-4">
                    <div class="flex items-center justify-between">
                        <div class="w-10 h-10 rounded-xl bg-gradient-to-br ${gradient} flex items-center justify-center shadow-lg">
                            <span class="text-white text-lg font-bold">${typeof value === 'number' ? value : value.split('/')[0]}</span>
                        </div>
                        <span class="text-2xl font-bold bg-gradient-to-r ${gradient} bg-clip-text text-transparent">${value}</span>
                    </div>
                    <p class="text-gray-400 text-sm font-medium mt-2">${title}</p>
                </div>
            </div>
        `;
    }
    
    function renderIzinContent() {
        const sudahAbsen = currentUserData?.absenMasuk;
        const timeLeft = activeIzin ? Math.max(0, Math.floor((activeIzin.endTime - new Date()) / 1000)) : 0;
        
        const container = document.getElementById('main-content');
        container.innerHTML = `
            <div class="max-w-4xl mx-auto">
                <div class="mb-8">
                    <h1 class="text-3xl lg:text-4xl font-bold bg-gradient-to-r from-purple-400 via-pink-400 to-purple-400 bg-clip-text text-transparent">Izin Keluar</h1>
                    <p class="text-gray-400 mt-2">Keluar kantor sementara dengan izin</p>
                </div>
                
                ${currentUserRole === 'LEADER' ? `
                    <div class="mb-6 bg-yellow-500/10 backdrop-blur-xl rounded-2xl border border-yellow-500/20 p-6 text-center">
                        <svg class="w-12 h-12 text-yellow-500 mx-auto mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
                        <h3 class="text-yellow-400 font-bold text-lg mb-2">Akses Terbatas</h3>
                        <p class="text-gray-400">Leader tidak dapat membuat izin keluar. Fitur ini hanya untuk staff operasional.</p>
                    </div>
                ` : activeIzin ? `
                    <div class="mb-6 bg-gradient-to-r from-purple-600/20 to-pink-600/20 backdrop-blur-xl rounded-2xl border border-purple-500/20 p-6">
                        <div class="flex items-center justify-between flex-wrap gap-4">
                            <div class="flex items-center gap-4">
                                <div class="w-12 h-12 rounded-full bg-purple-500/20 flex items-center justify-center">
                                    <svg class="w-6 h-6 text-purple-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                                </div>
                                <div>
                                    <p class="text-gray-400 text-sm">Sedang Izin Keluar</p>
                                    <p class="text-white text-xl font-bold">${activeIzin.type === 'merokok' ? 'Izin Merokok' : 'Izin Tidak Merokok'}</p>
                                </div>
                            </div>
                            <div class="text-center">
                                <p class="text-gray-400 text-sm">Sisa Waktu</p>
                                <p class="text-3xl font-bold text-purple-400 font-mono">${Math.floor(timeLeft / 60)}:${(timeLeft % 60).toString().padStart(2, '0')}</p>
                            </div>
                        </div>
                    </div>
                ` : `
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                        <button id="izin-merokok" class="group rounded-2xl p-6 bg-gray-900/50 backdrop-blur-xl border border-purple-500/20 hover:border-purple-500/50 hover:scale-105 transition-all">
                            <svg class="w-12 h-12 text-purple-400 mx-auto mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v3m4 2a4 4 0 11-8 0 4 4 0 018 0zM6 18h12M6 18v2h12v-2"></path></svg>
                            <h3 class="text-xl font-bold text-white mb-2">Izin Merokok</h3>
                            <p class="text-gray-300">Durasi: 20 menit</p>
                        </button>
                        <button id="izin-tidak-merokok" class="group rounded-2xl p-6 bg-gray-900/50 backdrop-blur-xl border border-purple-500/20 hover:border-purple-500/50 hover:scale-105 transition-all">
                            <svg class="w-12 h-12 text-purple-400 mx-auto mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            <h3 class="text-xl font-bold text-white mb-2">Izin Tidak Merokok</h3>
                            <p class="text-gray-300">Durasi: 15 menit</p>
                        </button>
                    </div>
                `}
                
                ${!sudahAbsen && !activeIzin && currentUserRole !== 'LEADER' ? `
                    <div class="mb-6 bg-red-500/10 backdrop-blur-xl rounded-2xl border border-red-500/20 p-4">
                        <p class="text-red-400 text-center">⚠️ Anda belum absen masuk! Silakan absen terlebih dahulu untuk membuat izin.</p>
                    </div>
                ` : ''}
                
                <div class="mb-6 bg-gray-900/50 backdrop-blur-xl rounded-2xl border border-purple-500/20 p-4">
                    <div class="flex justify-between items-center">
                        <span class="text-gray-400">Izin Hari Ini</span>
                        <span class="font-bold text-lg ${todayIzinCount >= 4 ? 'text-red-400' : 'text-purple-400'}">${todayIzinCount}/4</span>
                    </div>
                    <div class="mt-2 h-2 bg-gray-700 rounded-full overflow-hidden">
                        <div class="h-full bg-gradient-to-r from-purple-500 to-pink-500 rounded-full" style="width: ${(todayIzinCount / 4) * 100}%"></div>
                    </div>
                </div>
            </div>
        `;
        
        if (!activeIzin && currentUserRole !== 'LEADER' && sudahAbsen) {
            document.getElementById('izin-merokok')?.addEventListener('click', () => createIzin('merokok', 20));
            document.getElementById('izin-tidak-merokok')?.addEventListener('click', () => createIzin('tidak-merokok', 15));
        }
    }
    
    function renderAbsensiContent() {
        const sudahAbsen = currentUserData?.absenMasuk;
        const sudahPulang = currentUserData?.absenPulang;
        
        const container = document.getElementById('main-content');
        container.innerHTML = `
            <div class="max-w-2xl mx-auto">
                <div class="mb-8">
                    <h1 class="text-3xl lg:text-4xl font-bold bg-gradient-to-r from-purple-400 via-pink-400 to-purple-400 bg-clip-text text-transparent">Absensi Staff</h1>
                    <p class="text-gray-400 mt-2">Catat kehadiran Anda hari ini</p>
                </div>
                
                <div class="bg-gray-900/50 backdrop-blur-xl rounded-2xl border border-purple-500/20 p-8 text-center">
                    <div class="mb-6">
                        <div class="w-24 h-24 rounded-full bg-gradient-to-br from-purple-500 to-pink-500 flex items-center justify-center mx-auto shadow-lg">
                            <span class="text-white text-3xl font-bold">${currentUser?.name?.charAt(0) || 'U'}</span>
                        </div>
                        <h2 class="text-2xl font-bold text-white mt-4">${currentUser?.name}</h2>
                        <p class="text-purple-300 mt-1">${currentUserRole?.replace('_', ' ')}</p>
                        <p class="text-gray-500 text-sm mt-1">${currentUser?.email}</p>
                    </div>
                    
                    <div class="space-y-4">
                        ${!sudahAbsen ? `
                            <button id="absen-masuk" class="w-full py-4 bg-gradient-to-r from-green-600 to-emerald-600 rounded-xl text-white font-bold hover:shadow-lg transition-all">✅ Absen Masuk</button>
                        ` : sudahPulang ? `
                            <div class="p-4 bg-gray-500/20 rounded-xl">
                                <p class="text-green-400">✓ Sudah absen masuk</p>
                                <p class="text-blue-400 mt-2">✓ Sudah absen pulang</p>
                                <p class="text-gray-400 text-sm mt-3">Terima kasih, sampai jumpa besok! 👋</p>
                            </div>
                        ` : `
                            <div class="p-4 bg-green-500/20 rounded-xl"><p class="text-green-400">✓ Sudah absen masuk</p></div>
                            <button id="absen-pulang" class="w-full py-4 bg-gradient-to-r from-purple-600 to-pink-600 rounded-xl text-white font-bold hover:shadow-lg transition-all">🏠 Absen Pulang</button>
                        `}
                    </div>
                </div>
            </div>
        `;
        
        if (!sudahAbsen) document.getElementById('absen-masuk')?.addEventListener('click', absenMasuk);
        else if (!sudahPulang) document.getElementById('absen-pulang')?.addEventListener('click', absenPulang);
    }
    
    function renderStaffManagement() {
        const activeStaff = staffList.filter(s => s.id !== currentUserData?.id);
        
        const container = document.getElementById('main-content');
        container.innerHTML = `
            <div>
                <div class="mb-8">
                    <h1 class="text-3xl lg:text-4xl font-bold bg-gradient-to-r from-purple-400 via-pink-400 to-purple-400 bg-clip-text text-transparent">Management Staff</h1>
                    <p class="text-gray-400 mt-2">Daftarkan staff baru</p>
                </div>
                
                <div class="bg-gray-900/50 backdrop-blur-xl rounded-2xl border border-purple-500/20 p-6 mb-6">
                    <h2 class="text-xl font-semibold text-white mb-4">📝 Daftarkan Staff Baru</h2>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <input type="email" id="register-email" placeholder="Email" class="px-4 py-2 bg-gray-800/50 border border-purple-500/20 rounded-lg text-white">
                        <input type="text" id="register-name" placeholder="Nama Lengkap" class="px-4 py-2 bg-gray-800/50 border border-purple-500/20 rounded-lg text-white">
                        <select id="register-role" class="px-4 py-2 bg-gray-800/50 border border-purple-500/20 rounded-lg text-white">
                            <option value="KASIR">KASIR</option>
                            <option value="CS_LINE">CS LINE</option>
                            <option value="CS_LIVECHAT">CS LIVECHAT</option>
                            <option value="KKS">KKS</option>
                        </select>
                    </div>
                    <button id="register-staff-btn" class="mt-4 px-4 py-2 bg-gradient-to-r from-purple-600 to-pink-600 rounded-lg text-white font-medium">+ Daftarkan Staff</button>
                </div>
                
                <div class="bg-gray-900/50 backdrop-blur-xl rounded-2xl border border-purple-500/20 p-6">
                    <h2 class="text-xl font-semibold text-white mb-4">✅ Staff Aktif (${activeStaff.length})</h2>
                    <div class="overflow-x-auto">
                        <table class="w-full">
                            <thead><tr class="border-b border-purple-500/20"><th class="text-left py-3 px-4 text-gray-400">Nama</th><th class="text-left py-3 px-4 text-gray-400">Email</th><th class="text-left py-3 px-4 text-gray-400">Role</th><th class="text-left py-3 px-4 text-gray-400">Status</th><th class="text-left py-3 px-4 text-gray-400">Aksi</th></tr></thead>
                            <tbody>
                                ${activeStaff.map(staff => `
                                    <tr class="border-b border-purple-500/10">
                                        <td class="py-3 px-4 text-white">${staff.name}</td>
                                        <td class="py-3 px-4 text-gray-300">${staff.email}</td>
                                        <td class="py-3 px-4"><span class="px-2 py-1 rounded-lg text-xs bg-purple-500/20 text-purple-300">${staff.role?.replace('_', ' ')}</span></td>
                                        <td class="py-3 px-4"><span class="px-2 py-1 rounded-lg text-xs ${staff.online ? 'bg-green-500/20 text-green-400' : 'bg-gray-500/20 text-gray-400'}">${staff.online ? 'Online' : 'Offline'}</span></td>
                                        <td class="py-3 px-4">
                                            <button onclick="window.updateStaffRole('${staff.id}', prompt('Role baru:'))" class="text-purple-400 mr-2 text-sm">Edit</button>
                                            <button onclick="window.deleteStaff('${staff.id}')" class="text-red-400 text-sm">Hapus</button>
                                        </td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        `;
        
        document.getElementById('register-staff-btn')?.addEventListener('click', () => {
            registerStaff(
                document.getElementById('register-email').value,
                document.getElementById('register-name').value,
                document.getElementById('register-role').value
            );
        });
    }
    
    window.updateStaffRole = updateStaffRole;
    window.deleteStaff = deleteStaff;
    
    renderLogin();
</script>
</body>
</html>
