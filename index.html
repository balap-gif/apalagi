        // Helper Functions
        function showNotification(message, type = 'info') {
            const container = document.getElementById('notification-container');
            if (!container) return;
            
            const notification = document.createElement('div');
            const colors = {
                success: 'from-green-500 to-emerald-500',
                error: 'from-red-500 to-pink-500',
                warning: 'from-yellow-500 to-orange-500',
                info: 'from-blue-500 to-cyan-500'
            };
            
            notification.className = `transform transition-all duration-300 translate-x-full`;
            notification.innerHTML = `
                <div class="bg-gradient-to-r ${colors[type]} rounded-lg shadow-lg p-4 min-w-[300px] backdrop-blur-sm">
                    <div class="flex items-center gap-3">
                        <div class="w-8 h-8 rounded-full bg-white/20 flex items-center justify-center">
                            <span class="text-white text-lg">${type === 'success' ? '✓' : type === 'error' ? '✗' : type === 'warning' ? '!' : 'ℹ'}</span>
                        </div>
                        <p class="text-white font-medium">${message}</p>
                    </div>
                </div>
            `;
            
            container.appendChild(notification);
            setTimeout(() => notification.classList.remove('translate-x-full'), 100);
            setTimeout(() => {
                notification.classList.add('translate-x-full');
                setTimeout(() => notification.remove(), 300);
            }, 3000);
        }
        
        function playSound(type) {
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            if (type === 'warning') {
                oscillator.frequency.value = 880;
                gainNode.gain.value = 0.3;
                oscillator.start();
                setTimeout(() => oscillator.stop(), 500);
            } else if (type === 'success') {
                oscillator.frequency.value = 523.25;
                gainNode.gain.value = 0.2;
                oscillator.start();
                setTimeout(() => oscillator.stop(), 300);
            }
        }
        
        function formatTime(seconds) {
            if (!seconds && seconds !== 0) return '--:--';
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }
        
        function formatDate(date) {
            return new Date(date).toLocaleDateString('id-ID', {
                day: 'numeric',
                month: 'long',
                year: 'numeric'
            });
        }
        
        function formatTimeHM(date) {
            return new Date(date).toLocaleTimeString('id-ID', {
                hour: '2-digit',
                minute: '2-digit'
            });
        }

                        </div>
                    ` : `
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                            <button id="izin-merokok" class="group relative overflow-hidden rounded-2xl p-6 bg-gray-900/50 backdrop-blur-xl border border-purple-500/20 hover:border-purple-500/50 transition-all">
                                <svg class="w-10 h-10 text-purple-400 mx-auto mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v3m4 2a4 4 0 11-8 0 4 4 0 018 0zM6 18h12M6 18v2h12v-2"></path>
                                </svg>
                                <h3 class="text-xl font-bold text-white mb-2">Izin Merokok</h3>
                                <p class="text-gray-300">Durasi: 20 menit</p>
                            </button>
                            
                            <button id="izin-tidak-merokok" class="group relative overflow-hidden rounded-2xl p-6 bg-gray-900/50 backdrop-blur-xl border border-purple-500/20 hover:border-purple-500/50 transition-all">
                                <svg class="w-10 h-10 text-purple-400 mx-auto mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                                </svg>
                                <h3 class="text-xl font-bold text-white mb-2">Izin Tidak Merokok</h3>
                                <p class="text-gray-300">Durasi: 15 menit</p>
                            </button>
                        </div>
                    `}
                    
                    ${validationErrors.length > 0 && !activeIzin ? `
                        <div class="mb-6 bg-red-500/10 backdrop-blur-xl rounded-2xl border border-red-500/20 p-4">
                            <div class="flex items-start gap-3">
                                <svg class="w-5 h-5 text-red-400 flex-shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>
                                </svg>
                                <div>
                                    <p class="text-red-400 font-medium mb-2">Validasi Gagal:</p>
                                    <ul class="text-red-300 text-sm space-y-1">
                                        ${validationErrors.map(err => `<li>• ${err}</li>`).join('')}
                                    </ul>
                                </div>
                            </div>
                        </div>
                    ` : ''}
                    
                    <div class="mb-6 bg-gray-900/50 backdrop-blur-xl rounded-2xl border border-purple-500/20 p-4">
                        <div class="flex justify-between items-center">
                            <span class="text-gray-400">Izin Hari Ini</span>
                            <span class="font-bold text-lg ${todayIzinCount >= 4 ? 'text-red-400' : 'text-purple-400'}">${todayIzinCount}/4</span>
                        </div>
                        <div class="mt-2 h-2 bg-gray-700 rounded-full overflow-hidden">
                            <div class="h-full bg-gradient-to-r from-purple-500 to-pink-500 rounded-full transition-all" style="width: ${(todayIzinCount / 4) * 100}%"></div>
                        </div>
                    </div>
                </div>
            `;
            
            if (!activeIzin) {
                document.getElementById('izin-merokok')?.addEventListener('click', () => createIzin('merokok', 20));
                document.getElementById('izin-tidak-merokok')?.addEventListener('click', () => createIzin('tidak-merokok', 15));
            }
            
            if (activeIzin && countdownInterval) {
                updateCountdownDisplay();
            }
        }
        
        function renderAbsensiContent(container) {
            const staffData = staffList.find(s => s.id === currentUser?.uid);
            const sudahAbsen = staffData?.absenMasuk;
            
            container.innerHTML = `
                <div class="max-w-2xl mx-auto">
                    <div class="mb-8">
                        <h1 class="text-3xl lg:text-4xl font-bold bg-gradient-to-r from-purple-400 via-pink-400 to-purple-400 bg-clip-text text-transparent">
                            Absensi Staff
                        </h1>
                        <p class="text-gray-400 mt-2">Catat kehadiran Anda hari ini</p>
                    </div>
                    
                    <div class="bg-gray-900/50 backdrop-blur-xl rounded-2xl border border-purple-500/20 p-8 text-center">
                        <div class="mb-6">
                            <div class="w-24 h-24 rounded-full bg-gradient-to-br from-purple-500 to-pink-500 flex items-center justify-center mx-auto shadow-lg shadow-purple-500/50">
                                <svg class="w-12 h-12 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                                </svg>
                            </div>
                            <h2 class="text-2xl font-bold text-white mt-4">${staffData?.name || currentUserData?.name}</h2>
                            <p class="text-purple-300 mt-1">${currentUserRole?.replace('_', ' ')}</p>
                        </div>
                        
                        <div class="space-y-4">
                            ${!sudahAbsen ? `
                                <button id="absen-masuk" class="w-full py-4 bg-gradient-to-r from-green-600 to-emerald-600 rounded-xl text-white font-bold hover:shadow-lg hover:shadow-green-500/50 transition-all">
                                    Absen Masuk
                                </button>
                            ` : `
                                <div class="p-4 bg-green-500/20 rounded-xl border border-green-500/20">
                                    <p class="text-green-400">✓ Sudah absen masuk pada ${formatTimeHM(sudahAbsen)}</p>
                                </div>
                                <button id="absen-pulang" class="w-full py-4 bg-gradient-to-r from-purple-600 to-pink-600 rounded-xl text-white font-bold hover:shadow-lg hover:shadow-purple-500/50 transition-all">
                                    Absen Pulang
                                </button>
                            `}
                        </div>
                    </div>
                </div>
            `;
            
            if (!sudahAbsen) {
                document.getElementById('absen-masuk')?.addEventListener('click', () => absenMasuk());
            } else {
                document.getElementById('absen-pulang')?.addEventListener('click', () => absenPulang());
            }
        }
        
        function renderStaffManagement(container) {
            container.innerHTML = `
                <div>
                    <div class="mb-8">
                        <h1 class="text-3xl lg:text-4xl font-bold bg-gradient-to-r from-purple-400 via-pink-400 to-purple-400 bg-clip-text text-transparent">
                            Management Staff
                        </h1>
                        <p class="text-gray-400 mt-2">Kelola data dan role staff</p>
                    </div>
                    
                    <div class="bg-gray-900/50 backdrop-blur-xl rounded-2xl border border-purple-500/20 p-6">
                        <button id="add-staff-btn" class="mb-4 px-4 py-2 bg-gradient-to-r from-purple-600 to-pink-600 rounded-lg text-white text-sm font-medium hover:shadow-lg hover:shadow-purple-500/50 transition-all">
                            + Tambah Staff
                        </button>
                        
                        <div class="overflow-x-auto">
                            <table class="w-full">
                                <thead>
                                    <tr class="border-b border-purple-500/20">
                                        <th class="text-left py-3 px-4 text-gray-400 font-medium">Nama</th>
                                        <th class="text-left py-3 px-4 text-gray-400 font-medium">Email</th>
                                        <th class="text-left py-3 px-4 text-gray-400 font-medium">Role</th>
                                        <th class="text-left py-3 px-4 text-gray-400 font-medium">Aksi</th>
                                    </tr>
                                </thead>
                                <tbody id="staff-management-body"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            `;
            
            renderStaffManagementTable();
            
            document.getElementById('add-staff-btn')?.addEventListener('click', () => {
                const name = prompt('Nama staff:');
                const email = prompt('Email staff:');
                const password = prompt('Password sementara:');
                const role = prompt('Role (LEADER/CS_LINE/CS_LIVECHAT/KKS/KASIR):');
                
                if (name && email && password && role) {
                    addStaff({ name, email, password, role });
                }
            });
        }
        
        function renderStaffManagementTable() {
            const tbody = document.getElementById('staff-management-body');
            if (!tbody) return;
            
            tbody.innerHTML = staffList.map(staff => `
                <tr class="border-b border-purple-500/10">
                    <td class="py-3 px-4 text-white">${staff.name || '-'}</td>
                    <td class="py-3 px-4 text-gray-300">${staff.email || '-'}</td>
                    <td class="py-3 px-4">
                        <span class="px-2 py-1 rounded-lg text-xs font-medium bg-purple-500/20 text-purple-300">${staff.role?.replace('_', ' ') || '-'}</span>
                    </td>
                    <td class="py-3 px-4">
                        <button onclick="editStaff('${staff.id}')" class="text-purple-400 hover:text-purple-300 mr-2">Edit</button>
                        <button onclick="deleteStaff('${staff.id}')" class="text-red-400 hover:text-red-300">Hapus</button>
                    </td>
                </tr>
            `).join('');
        }
        
        // Business Logic Functions
        async function createIzin(type, duration) {
            const staffData = staffList.find(s => s.id === currentUser?.uid);
            
            // Validations
            if (!staffData?.absenMasuk) {
                showNotification('Anda belum absen masuk!', 'error');
                return;
            }
            
            if (todayIzinCount >= 4) {
                showNotification('Batas izin harian telah tercapai (4/4)!', 'error');
                return;
            }
            
            // Check minimum staff requirement
            const sameRoleStaff = staffList.filter(s => s.role === staffData?.role && s.online && !s.izinStatus);
            const minRequirements = { KASIR: 3, CS_LINE: 2, CS_LIVECHAT: 2, KKS: 2 };
            const minRequired = minRequirements[staffData?.role];
            
            if (minRequired && sameRoleStaff.length < minRequired) {
                showNotification(`Minimal ${minRequired} staff ${staffData?.role} harus tetap aktif!`, 'error');
                return;
            }
            
            const endTime = new Date();
            endTime.setMinutes(endTime.getMinutes() + duration);
            
            try {
                const izinData = {
                    staffId: currentUser.uid,
                    staffName: staffData?.name,
                    role: staffData?.role,
                    type: type,
                    duration: duration,
                    startTime: serverTimestamp(),
                    endTime: endTime,
                    date: new Date().toISOString().split('T')[0],
                    status: 'active',
                    late: false
                };
                
                const docRef = await addDoc(collection(db, 'izin'), izinData);
                
                // Update staff status
                const staffRef = doc(db, 'staff', currentUser.uid);
                await updateDoc(staffRef, {
                    izinStatus: 'keluar',
                    status: 'izin',
                    izinStart: new Date(),
                    izinEnd: endTime
                });
                
                showNotification(`Izin ${type === 'merokok' ? 'Merokok' : 'Tidak Merokok'} berhasil dibuat!`, 'success');
                playSound('success');
                
                // Refresh data
                await loadStaffData();
                
            } catch (error) {
                console.error('Error:', error);
                showNotification('Gagal membuat izin', 'error');
            }
        }
        
        async function absenMasuk() {
            try {
                const staffRef = doc(db, 'staff', currentUser.uid);
                await updateDoc(staffRef, {
                    absenMasuk: new Date(),
                    status: 'aktif',
                    online: true
                });
                
                showNotification('Absen masuk berhasil!', 'success');
                playSound('success');
                await loadStaffData();
                setActivePage('dashboard');
            } catch (error) {
                showNotification('Gagal absen masuk', 'error');
            }
        }
        
        async function absenPulang() {
            try {
                const staffRef = doc(db, 'staff', currentUser.uid);
                await updateDoc(staffRef, {
                    absenPulang: new Date(),
                    online: false
                });
                
                showNotification('Absen pulang berhasil!', 'success');
                await loadStaffData();
                setActivePage('dashboard');
            } catch (error) {
                showNotification('Gagal absen pulang', 'error');
            }
        }
        
        async function addStaff(data) {
            try {
                // This would typically create auth user first, then staff doc
                const staffRef = doc(db, 'staff', Date.now().toString());
                await setDoc(staffRef, {
                    name: data.name,
                    email: data.email,
                    role: data.role,
                    status: 'aktif',
                    online: false,
                    createdAt: serverTimestamp()
                });
                
                showNotification('Staff berhasil ditambahkan!', 'success');
                await loadStaffData();
            } catch (error) {
                showNotification('Gagal menambahkan staff', 'error');
            }
        }
        
        window.editStaff = async (staffId) => {
            const newRole = prompt('Role baru (LEADER/CS_LINE/CS_LIVECHAT/KKS/KASIR):');
            if (newRole) {
                try {
                    const staffRef = doc(db, 'staff', staffId);
                    await updateDoc(staffRef, { role: newRole });
                    showNotification('Role staff berhasil diupdate!', 'success');
                    await loadStaffData();
                } catch (error) {
                    showNotification('Gagal mengupdate role', 'error');
                }
            }
        };
        
        window.deleteStaff = async (staffId) => {
            if (confirm('Yakin ingin menghapus staff ini?')) {
                try {
                    await deleteDoc(doc(db, 'staff', staffId));
                    showNotification('Staff berhasil dihapus!', 'success');
                    await loadStaffData();
                } catch (error) {
                    showNotification('Gagal menghapus staff', 'error');
                }
            }
        };
        
        function getCurrentShift() {
            const hour = new Date().getHours();
            if (hour >= 6 && hour < 14) return 'Pagi';
            if (hour >= 14 && hour < 22) return 'Sore';
            return 'Malam';
        }
        
        function getValidationErrors() {
            const errors = [];
            const staffData = staffList.find(s => s.id === currentUser?.uid);
            
            if (!staffData?.absenMasuk) {
                errors.push('Anda belum absen masuk');
            }
            
            if (todayIzinCount >= 4) {
                errors.push('Batas izin harian telah tercapai');
            }
            
            if (activeIzin) {
                errors.push('Anda sedang dalam status izin');
            }
            
            return errors;
        }
        
        function updateCountdownDisplay() {
            if (activeIzin && activeIzin.endTime) {
                const now = new Date();
                const end = new Date(activeIzin.endTime);
                const diff = Math.max(0, Math.floor((end - now) / 1000));
                
                const timer = document.getElementById('countdown-timer');
                if (timer) timer.textContent = formatTime(diff);
                
                if (diff <= 0 && countdownInterval) {
                    clearInterval(countdownInterval);
                    handleIzinTimeout();
                }
            }
        }
        
        async function handleIzinTimeout() {
            if (activeIzin) {
                try {
                    const izinRef = doc(db, 'izin', activeIzin.id);
                    await updateDoc(izinRef, {
                        status: 'completed',
                        completedAt: serverTimestamp(),
                        late: false
                    });
                    
                    const staffRef = doc(db, 'staff', currentUser.uid);
                    await updateDoc(staffRef, {
                        izinStatus: null,
                        status: 'aktif'
                    });
                    
                    setActiveIzin(null);
                    showNotification('Waktu izin telah selesai', 'info');
                    await loadStaffData();
                } catch (error) {
                    console.error('Error:', error);
                }
            }
        }
        
        // Data Loading Functions
        async function loadStaffData() {
            try {
                const snapshot = await getDocs(collection(db, 'staff'));
                staffList = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                
                // Update current user data
                currentUserData = staffList.find(s => s.id === currentUser?.uid);
                
                // Check today's izin count
                const today = new Date().toISOString().split('T')[0];
                const izinSnapshot = await getDocs(query(
                    collection(db, 'izin'),
                    where('staffId', '==', currentUser?.uid),
                    where('date', '==', today)
                ));
                todayIzinCount = izinSnapshot.size;
                
                // Check active izin
                const activeIzinSnapshot = await getDocs(query(
                    collection(db, 'izin'),
                    where('staffId', '==', currentUser?.uid),
                    where('status', '==', 'active')
                ));
                
                if (!activeIzinSnapshot.empty) {
                    const izinDoc = activeIzinSnapshot.docs[0];
                    setActiveIzin({ id: izinDoc.id, ...izinDoc.data() });
                    
                    if (countdownInterval) clearInterval(countdownInterval);
                    countdownInterval = setInterval(() => updateCountdownDisplay(), 1000);
                } else {
                    setActiveIzin(null);
                    if (countdownInterval) clearInterval(countdownInterval);
                }
                
                // Refresh UI if on relevant pages
                const currentContent = document.getElementById('main-content');
                if (currentContent && currentContent.innerHTML.includes('Daftar Staff')) {
                    renderStaffTable();
                }
                
                if (currentContent && currentContent.innerHTML.includes('Management Staff')) {
                    renderStaffManagementTable();
                }
                
            } catch (error) {
                console.error('Error loading staff:', error);
            }
        }
        
        function setActiveIzin(izin) {
            activeIzin = izin;
        }
        
        function startRealtimeListeners() {
            // Staff listener
            if (unsubscribeStaff) unsubscribeStaff();
            
            unsubscribeStaff = onSnapshot(collection(db, 'staff'), (snapshot) => {
                staffList = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                currentUserData = staffList.find(s => s.id === currentUser?.uid);
                
                // Update UI
                const currentContent = document.getElementById('main-content');
                if (currentContent && currentContent.innerHTML.includes('Daftar Staff')) {
                    renderStaffTable();
                }
            });
        }
        
        // Auth State Listener
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                
                // Load user role from Firestore
                const userDoc = await getDoc(doc(db, 'staff', user.uid));
                if (userDoc.exists()) {
                    currentUserData = userDoc.data();
                    currentUserRole = currentUserData.role;
                }
                
                await loadStaffData();
                renderApp();
            } else {
                currentUser = null;
                currentUserRole = null;
                currentUserData = null;
                if (unsubscribeStaff) unsubscribeStaff();
                if (countdownInterval) clearInterval(countdownInterval);
                renderApp();
            }
        });
        
        // Initial render
        renderApp();
    </script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0a0a0a;
            overflow-x: hidden;
        }
        
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }
        
        ::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, #a855f7, #7c3aed);
            border-radius: 10px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(135deg, #c084fc, #8b5cf6);
        }
        
        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.5;
            }
        }
        
        .animate-pulse {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
    </style>
</head>
<body>
    <div id="app"></div>
</body>
</html>
