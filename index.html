        // ============ FIREBASE CONFIGURATION ============
        const firebaseConfig = {
            apiKey: "AIzaSyCXrNxaFTOjXiD7B21t2xEfZiKd5H5mBhg",
            authDomain: "staff-dashboard-izin.firebaseapp.com",
            projectId: "staff-dashboard-izin",
            storageBucket: "staff-dashboard-izin.firebasestorage.app",
            messagingSenderId: "1052374332545",
            appId: "1:1052374332545:web:4749f171233e24a9404980",
            measurementId: "G-CYLQ4KH32M"
        };
        
        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const googleProvider = new GoogleAuthProvider();
        
        // ============ PRE-REGISTERED LEADER ============
        const PRE_REGISTERED_LEADER = {
            email: "haris789smb@gmail.com",
            name: "Haris - Leader",
            role: "LEADER"
        };
        
        // ============ GLOBAL STATE ============
        let currentUser = null;
        let currentUserRole = null;
        let currentUserData = null;
        let staffList = [];
        let activeIzin = null;
        let countdownInterval = null;
        let todayIzinCount = 0;
        let unsubscribeStaff = null;
        let currentPage = 'dashboard';
        
        // ============ HELPER FUNCTIONS ============
        function showNotification(message, type = 'info') {
            const container = document.getElementById('notification-container');
            if (!container) return;
            
            const colors = {
                success: 'from-green-500 to-emerald-500',
                error: 'from-red-500 to-pink-500',
                warning: 'from-yellow-500 to-orange-500',
                info: 'from-blue-500 to-cyan-500'
            };
            
            const icons = {
                success: '✓',
                error: '✗',
                warning: '!',
                info: 'ℹ'
            };
            
            const notification = document.createElement('div');
            notification.className = 'transform transition-all duration-300 translate-x-full mb-2';
            notification.innerHTML = `
                <div class="bg-gradient-to-r ${colors[type]} rounded-lg shadow-lg p-4 min-w-[300px] backdrop-blur-sm">
                    <div class="flex items-center gap-3">
                        <div class="w-8 h-8 rounded-full bg-white/20 flex items-center justify-center">
                            <span class="text-white text-lg font-bold">${icons[type]}</span>
                        </div>
                        <p class="text-white font-medium">${message}</p>
                    </div>
                </div>
            `;
            
            container.appendChild(notification);
            setTimeout(() => notification.classList.remove('translate-x-full'), 100);
            setTimeout(() => {
                notification.classList.add('translate-x-full');
                setTimeout(() => notification.remove(), 300);
            }, 3000);
        }
        
        function formatTime(seconds) {
            if (!seconds && seconds !== 0) return '--:--';
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }
        
        function formatDateTime(date) {
            if (!date) return '-';
            const d = date.toDate ? date.toDate() : new Date(date);
            return d.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        }
        
        function getCurrentShift() {
            const hour = new Date().getHours();
            if (hour >= 6 && hour < 14) return '🌅 Pagi (06:00-14:00)';
            if (hour >= 14 && hour < 22) return '🌇 Sore (14:00-22:00)';
            return '🌙 Malam (22:00-06:00)';
        }
        
        // ============ AUTO REGISTER LEADER ============
        async function autoRegisterLeader(userId, email, displayName) {
            // Cek apakah leader sudah terdaftar
            const leaderDoc = await getDoc(doc(db, 'staff', userId));
            
            if (!leaderDoc.exists()) {
                // Daftarkan leader otomatis
                await setDoc(doc(db, 'staff', userId), {
                    email: email,
                    name: displayName || PRE_REGISTERED_LEADER.name,
                    role: PRE_REGISTERED_LEADER.role,
                    status: 'aktif',
                    online: true,
                    isRegistered: true,
                    registeredAt: serverTimestamp(),
                    isLeader: true
                });
                showNotification('✅ Selamat datang Leader! Anda memiliki akses penuh.', 'success');
                return true;
            }
            return true;
        }
        
        // ============ DATA LOADING ============
        async function loadStaffData() {
            try {
                const snapshot = await getDocs(collection(db, 'staff'));
                staffList = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                
                // Update current user data
                currentUserData = staffList.find(s => s.id === currentUser?.uid);
                
                if (currentUserData) {
                    // Check today's izin count
                    const today = new Date().toISOString().split('T')[0];
                    const izinSnapshot = await getDocs(query(
                        collection(db, 'izin'),
                        where('staffId', '==', currentUser?.uid),
                        where('date', '==', today)
                    ));
                    todayIzinCount = izinSnapshot.size;
                    
                    // Check active izin
                    const activeIzinSnapshot = await getDocs(query(
                        collection(db, 'izin'),
                        where('staffId', '==', currentUser?.uid),
                        where('status', '==', 'active')
                    ));
                    
                    if (!activeIzinSnapshot.empty) {
                        const izinDoc = activeIzinSnapshot.docs[0];
                        activeIzin = { id: izinDoc.id, ...izinDoc.data() };
                        
                        if (countdownInterval) clearInterval(countdownInterval);
                        countdownInterval = setInterval(() => updateCountdownDisplay(), 1000);
                    } else {
                        if (activeIzin) {
                            activeIzin = null;
                            if (countdownInterval) clearInterval(countdownInterval);
                        }
                    }
                }
                
                // Refresh UI based on current page
                refreshCurrentPage();
                
            } catch (error) {
                console.error('Error loading staff:', error);
            }
        }
        
        async function updateCountdownDisplay() {
            if (activeIzin && activeIzin.endTime) {
                const now = new Date();
                const end = activeIzin.endTime.toDate ? activeIzin.endTime.toDate() : new Date(activeIzin.endTime);
                const diff = Math.max(0, Math.floor((end - now) / 1000));
                
                const timer = document.getElementById('countdown-timer');
                if (timer) timer.textContent = formatTime(diff);
                
                if (diff <= 0 && countdownInterval) {
                    clearInterval(countdownInterval);
                    await handleIzinTimeout();
                }
            }
        }
        
        async function handleIzinTimeout() {
            if (activeIzin) {
                try {
                    const izinRef = doc(db, 'izin', activeIzin.id);
                    await updateDoc(izinRef, {
                        status: 'completed',
                        completedAt: serverTimestamp(),
                        late: false
                    });
                    
                    const staffRef = doc(db, 'staff', currentUser.uid);
                    await updateDoc(staffRef, {
                        izinStatus: null,
                        status: 'aktif'
                    });
                    
                    activeIzin = null;
                    showNotification('Waktu izin telah selesai, silakan kembali bertugas', 'info');
                    await loadStaffData();
                } catch (error) {
                    console.error('Error handling izin timeout:', error);
                }
            }
        }
        
        // ============ BUSINESS LOGIC ============
        async function createIzin(type, duration) {
            if (currentUserRole === 'LEADER') {
                showNotification('Leader tidak dapat membuat izin keluar', 'warning');
                return;
            }
            
            if (!currentUserData?.absenMasuk) {
                showNotification('❌ Anda belum absen masuk! Silakan absen terlebih dahulu.', 'error');
                return;
            }
            
            if (todayIzinCount >= 4) {
                showNotification('❌ Batas izin harian telah tercapai (4/4)!', 'error');
                return;
            }
            
            // Check minimum staff requirement
            const sameRoleStaff = staffList.filter(s => s.role === currentUserData?.role && s.online && !s.izinStatus && s.id !== currentUser?.uid);
            const minRequirements = { KASIR: 3, CS_LINE: 2, CS_LIVECHAT: 2, KKS: 2 };
            const minRequired = minRequirements[currentUserData?.role];
            
            if (minRequired && sameRoleStaff.length < minRequired - 1) {
                showNotification(`❌ Minimal ${minRequired} staff ${currentUserData?.role} harus tetap aktif!`, 'error');
                return;
            }
            
            const endTime = new Date();
            endTime.setMinutes(endTime.getMinutes() + duration);
            
            try {
                const izinData = {
                    staffId: currentUser.uid,
                    staffName: currentUserData?.name,
                    role: currentUserData?.role,
                    type: type,
                    duration: duration,
                    startTime: serverTimestamp(),
                    endTime: endTime,
                    date: new Date().toISOString().split('T')[0],
                    status: 'active',
                    late: false
                };
                
                const docRef = await addDoc(collection(db, 'izin'), izinData);
                
                // Update staff status
                const staffRef = doc(db, 'staff', currentUser.uid);
                await updateDoc(staffRef, {
                    izinStatus: 'keluar',
                    status: 'izin',
                    izinStart: serverTimestamp(),
                    izinEnd: endTime
                });
                
                showNotification(`✅ Izin ${type === 'merokok' ? 'Merokok' : 'Tidak Merokok'} berhasil dibuat! Durasi: ${duration} menit`, 'success');
                await loadStaffData();
                
            } catch (error) {
                console.error('Error creating izin:', error);
                showNotification('❌ Gagal membuat izin', 'error');
            }
        }
        
        async function absenMasuk() {
            try {
                const staffRef = doc(db, 'staff', currentUser.uid);
                await updateDoc(staffRef, {
                    absenMasuk: serverTimestamp(),
                    status: 'aktif',
                    online: true,
                    lastActive: serverTimestamp()
                });
                
                showNotification('✅ Absen masuk berhasil!', 'success');
                await loadStaffData();
                setActivePage('dashboard');
            } catch (error) {
                showNotification('❌ Gagal absen masuk', 'error');
            }
        }
        
        async function absenPulang() {
            try {
                const staffRef = doc(db, 'staff', currentUser.uid);
                await updateDoc(staffRef, {
                    absenPulang: serverTimestamp(),
                    online: false,
                    lastActive: serverTimestamp()
                });
                
                showNotification('✅ Absen pulang berhasil! Terima kasih.', 'success');
                await loadStaffData();
                setActivePage('dashboard');
            } catch (error) {
                showNotification('❌ Gagal absen pulang', 'error');
            }
        }
        
        // ============ STAFF MANAGEMENT (LEADER ONLY) ============
        async function registerStaff(email, name, role) {
            if (currentUserRole !== 'LEADER') {
                showNotification('Akses ditolak! Hanya Leader yang dapat mendaftarkan staff.', 'error');
                return;
            }
            
            if (!email || !name || !role) {
                showNotification('Semua field harus diisi!', 'error');
                return;
            }
            
            // Cek apakah email sudah terdaftar
            const existingStaff = staffList.find(s => s.email === email);
            if (existingStaff) {
                showNotification('Email sudah terdaftar!', 'error');
                return;
            }
            
            try {
                const staffId = 'pending_' + Date.now();
                const staffRef = doc(db, 'staff', staffId);
                await setDoc(staffRef, {
                    email: email,
                    name: name,
                    role: role,
                    status: 'pending',
                    online: false,
                    registeredBy: currentUser.uid,
                    registeredAt: serverTimestamp(),
                    isRegistered: false
                });
                
                showNotification(`✅ Staff ${name} (${email}) berhasil didaftarkan! Staff dapat login dengan Google.`, 'success');
                await loadStaffData();
                renderStaffManagement();
            } catch (error) {
                console.error('Error registering staff:', error);
                showNotification('❌ Gagal mendaftarkan staff', 'error');
            }
        }
        
        async function verifyStaffRegistration(userId, email, displayName) {
            const pendingStaff = staffList.find(s => s.email === email && s.status === 'pending');
            
            if (pendingStaff) {
                const newDocRef = doc(db, 'staff', userId);
                await setDoc(newDocRef, {
                    email: email,
                    name: pendingStaff.name || displayName,
                    role: pendingStaff.role,
                    status: 'aktif',
                    online: true,
                    registeredBy: pendingStaff.registeredBy,
                    registeredAt: pendingStaff.registeredAt,
                    verifiedAt: serverTimestamp(),
                    isRegistered: true
                });
                
                await deleteDoc(doc(db, 'staff', pendingStaff.id));
                
                showNotification(`✅ Selamat datang ${pendingStaff.name}! Akun Anda sudah aktif.`, 'success');
                return true;
            }
            
            return false;
        }
        
        async function updateStaffRole(staffId, newRole) {
            if (currentUserRole !== 'LEADER') {
                showNotification('Akses ditolak!', 'error');
                return;
            }
            
            if (!newRole) return;
            
            try {
                const staffRef = doc(db, 'staff', staffId);
                await updateDoc(staffRef, { role: newRole });
                showNotification('✅ Role staff berhasil diupdate!', 'success');
                await loadStaffData();
                renderStaffManagement();
            } catch (error) {
                showNotification('❌ Gagal mengupdate role', 'error');
            }
        }
        
        async function deleteStaff(staffId) {
            if (currentUserRole !== 'LEADER') {
                showNotification('Akses ditolak!', 'error');
                return;
            }
            
            if (confirm('Yakin ingin menghapus staff ini?')) {
                try {
                    await deleteDoc(doc(db, 'staff', staffId));
                    showNotification('✅ Staff berhasil dihapus!', 'success');
                    await loadStaffData();
                    renderStaffManagement();
                } catch (error) {
                    showNotification('❌ Gagal menghapus staff', 'error');
                }
            }
        }
        
        // ============ GOOGLE LOGIN ============
        async function loginWithGoogle() {
            try {
                showNotification('Mengalihkan ke Google Sign-In...', 'info');
                const result = await signInWithPopup(auth, googleProvider);
                const user = result.user;
                
                // Auto register jika ini adalah leader yang sudah ditentukan
                if (user.email === PRE_REGISTERED_LEADER.email) {
                    await autoRegisterLeader(user.uid, user.email, user.displayName);
                } else {
                    // Verifikasi staff biasa
                    const verified = await verifyStaffRegistration(user.uid, user.email, user.displayName);
                    if (!verified) {
                        showNotification('❌ Email Anda belum didaftarkan oleh Leader. Silakan hubungi Leader.', 'error');
                        await signOut(auth);
                        return;
                    }
                }
                
                showNotification('Login berhasil!', 'success');
            } catch (error) {
                console.error('Error logging in with Google:', error);
                showNotification('Login gagal: ' + error.message, 'error');
            }
        }
        
        // ============ RENDER FUNCTIONS ============
        function refreshCurrentPage() {
            if (currentPage === 'dashboard') renderDashboardContent();
            else if (currentPage === 'izin') renderIzinContent();
            else if (currentPage === 'absensi') renderAbsensiContent();
            else if (currentPage === 'staff') renderStaffManagement();
        }
        
        function setActivePage(page) {
            currentPage = page;
            refreshCurrentPage();
            
            document.querySelectorAll('.nav-item').forEach(item => {
                if (item.dataset.page === page) {
                    item.classList.add('bg-gradient-to-r', 'from-purple-600/20', 'to-pink-600/20', 'border-l-4', 'border-purple-500');
                    item.querySelector('span').classList.add('text-white');
                    item.querySelector('span').classList.remove('text-gray-300');
                } else {
                    item.classList.remove('bg-gradient-to-r', 'from-purple-600/20', 'to-pink-600/20', 'border-l-4', 'border-purple-500');
                    item.querySelector('span').classList.remove('text-white');
                    item.querySelector('span').classList.add('text-gray-300');
                }
            });
        }

                                            <td class="py-3 px-4 text-gray-300">${staff.email || '-'}</td>
                                            <td class="py-3 px-4"><span class="px-2 py-1 rounded-lg text-xs bg-purple-500/20 text-purple-300">${staff.role?.replace('_', ' ')}</span></td>
                                            <td class="py-3 px-4">
                                                <span class="px-2 py-1 rounded-lg text-xs ${staff.online ? 'bg-green-500/20 text-green-400' : 'bg-gray-500/20 text-gray-400'}">
                                                    ${staff.online ? 'Online' : 'Offline'}
                                                </span>
                                            </td>
                                            <td class="py-3 px-4">
                                                <button onclick="window.updateStaffRole('${staff.id}', prompt('Role baru (KASIR/CS_LINE/CS_LIVECHAT/KKS):'))" class="text-purple-400 hover:text-purple-300 mr-2 text-sm">Edit Role</button>
                                                <button onclick="window.deleteStaff('${staff.id}')" class="text-red-400 hover:text-red-300 text-sm">Hapus</button>
                                            </td>
                                        </tr>
                                    `).join('')}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            `;
            
            document.getElementById('register-staff-btn')?.addEventListener('click', () => {
                const email = document.getElementById('register-email').value;
                const name = document.getElementById('register-name').value;
                const role = document.getElementById('register-role').value;
                registerStaff(email, name, role);
                
                document.getElementById('register-email').value = '';
                document.getElementById('register-name').value = '';
            });
        }
        
        function startRealtimeListeners() {
            if (unsubscribeStaff) unsubscribeStaff();
            
            unsubscribeStaff = onSnapshot(collection(db, 'staff'), (snapshot) => {
                staffList = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                currentUserData = staffList.find(s => s.id === currentUser?.uid);
                if (currentUserData) {
                    currentUserRole = currentUserData.role;
                }
                refreshCurrentPage();
            });
        }
        
        window.updateStaffRole = updateStaffRole;
        window.deleteStaff = deleteStaff;
        
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                
                const userDoc = await getDoc(doc(db, 'staff', user.uid));
                if (userDoc.exists()) {
                    currentUserData = userDoc.data();
                    currentUserRole = currentUserData.role;
                    await loadStaffData();
                    startRealtimeListeners();
                    renderDashboard();
                } else if (user.email === PRE_REGISTERED_LEADER.email) {
                    await autoRegisterLeader(user.uid, user.email, user.displayName);
                    await loadStaffData();
                    startRealtimeListeners();
                    renderDashboard();
                } else {
                    const verified = await verifyStaffRegistration(user.uid, user.email, user.displayName);
                    if (verified) {
                        await loadStaffData();
                        startRealtimeListeners();
                        renderDashboard();
                    } else {
                        showNotification('❌ Email Anda belum didaftarkan oleh Leader. Silakan hubungi Leader.', 'error');
                        await signOut(auth);
                    }
                }
            } else {
                currentUser = null;
                currentUserRole = null;
                currentUserData = null;
                if (unsubscribeStaff) unsubscribeStaff();
                if (countdownInterval) clearInterval(countdownInterval);
                renderLogin();
            }
        });
        
        renderLogin();
    </script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #0a0a0a; overflow-x: hidden; }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: linear-gradient(135deg, #a855f7, #7c3aed); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: linear-gradient(135deg, #c084fc, #8b5cf6); }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
        .animate-pulse { animation: pulse 2s cubic-bezier(0.4,0,0.6,1) infinite; }
    </style>
</head>
<body>
    <div id="app"></div>
</body>
</html>
